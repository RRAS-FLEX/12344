[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

[context.production.environment]
# Recommended: set these in the Netlify UI (Site settings → Build & deploy → Environment)
# VITE_API_BASE_URL = "https://api.yoursite.com"

[dev]
  # Run Vite for the frontend during local Netlify Dev
  command = "npm run dev:frontend -- --host 0.0.0.0 --port 8081 --strictPort"
  port = 8888
  # Vite's internal server port that Netlify Dev should proxy to
  targetPort = 8081
  framework = "vite"
